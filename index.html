<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDN File Browser</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin-top: 0; font-size: 1.6rem; }
    p { margin: 0.5rem 0 1rem; }
    ul { list-style: none; padding-left: 1.2rem; margin: 0; }
    li { margin: 0.35rem 0; }
    .folder > .label { font-weight: 600; }
    .file {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .download {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border: 1px solid #0969da;
      border-radius: 4px;
      text-decoration: none;
      color: #0969da;
      font-size: 0.9rem;
    }
    .open-link {
      color: #0969da;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .download:hover { background: #ddf4ff; }
    .open-link:hover { text-decoration: underline; }
    .muted { color: #57606a; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <h1>CDN File Browser</h1>
    <p>Browse available CDN files and download them directly.</p>
    <p class="muted">Update the <code>cdnFiles</code> array in this file to match your real CDN paths.</p>
    <div id="tree"></div>
  </main>

  <script>
    const cdnFiles = [
      { path: "images/logo.png", url: "https://cdn.example.com/images/logo.png" },
      { path: "docs/guide.pdf", url: "https://cdn.example.com/docs/guide.pdf" },
      { path: "videos/intro.mp4", url: "https://cdn.example.com/videos/intro.mp4" }
    ];

    function createTree(files) {
      const root = { folders: {}, files: [] };

      for (const file of files) {
        const parts = file.path.split("/");
        let folder = root;

        for (let i = 0; i < parts.length - 1; i += 1) {
          const segment = parts[i];
          if (!folder.folders[segment]) {
            folder.folders[segment] = { folders: {}, files: [] };
          }
          folder = folder.folders[segment];
        }

        folder.files.push({
          name: parts[parts.length - 1],
          url: file.url
        });
      }

      return root;
    }

    function renderNode(treeNode) {
      const ul = document.createElement("ul");

      Object.entries(treeNode.folders)
        .sort(([a], [b]) => a.localeCompare(b))
        .forEach(([folderName, folderNode]) => {
          const li = document.createElement("li");
          li.className = "folder";
          const label = document.createElement("div");
          label.className = "label";
          label.textContent = `📁 ${folderName}`;
          li.appendChild(label);
          li.appendChild(renderNode(folderNode));
          ul.appendChild(li);
        });

      treeNode.files
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .forEach((file) => {
          const li = document.createElement("li");
          const fileRow = document.createElement("div");
          fileRow.className = "file";

          const fileName = document.createElement("span");
          fileName.textContent = `📄 ${file.name}`;

          const downloadLink = document.createElement("a");
          downloadLink.className = "download";
          downloadLink.href = file.url;
          downloadLink.setAttribute("download", file.name);
          downloadLink.textContent = "Download";

          const openLink = document.createElement("a");
          openLink.className = "open-link";
          openLink.href = file.url;
          openLink.target = "_blank";
          openLink.rel = "noopener noreferrer";
          openLink.textContent = "Open";

          fileRow.appendChild(fileName);
          fileRow.appendChild(downloadLink);
          fileRow.appendChild(openLink);
          li.appendChild(fileRow);
          ul.appendChild(li);
        });

      return ul;
    }

    const treeElement = document.getElementById("tree");
    treeElement.appendChild(renderNode(createTree(cdnFiles)));
  </script>
</body>
</html>
